<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Edge Checker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">⚡</span>
        <span>Edge<span class="logo-accent">Checker</span></span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Fixtures</a>
        <a href="/acca" class="nav-link acca-nav-link" id="acca-nav-link">
          🎰 My Acca <span class="acca-badge" id="acca-badge" style="display:none">0</span>
        </a>
        <label class="upload-btn coming-soon" title="Coming soon">
          📸 Upload Slip <span class="badge">Soon</span>
        </label>
      </nav>
    </div>
  </header>

  {% if demo_mode is defined and demo_mode %}
  <div class="demo-banner">
    <strong>Demo mode</strong> — Add your API keys to <code>.env</code> for live data.
    See <a href="https://dashboard.api-sports.io" target="_blank">API-Football</a>
    and <a href="https://the-odds-api.com" target="_blank">The Odds API</a>.
  </div>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>Edge Checker &mdash; Bet smarter, not harder. 18+ | Please gamble responsibly.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/acca.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
