<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Edge Checker{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">
        <span class="logo-mark">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </span>
        <span class="logo-text">Edge<span class="logo-accent">Checker</span></span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Fixtures</a>
        <a href="/acca" class="nav-link acca-nav-link" id="acca-nav-link">
          Acca <span class="acca-badge" id="acca-badge" style="display:none">0</span>
        </a>
        <span class="coming-soon">
          Upload Slip <span class="badge-pill">Soon</span>
        </span>
      </nav>
    </div>
  </header>

  {% if demo_mode is defined and demo_mode %}
  <div class="demo-banner">
    Demo mode — add <code>API_FOOTBALL_KEY</code> and <code>ODDS_API_KEY</code> to <code>.env</code> for live data.
  </div>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>Edge Checker &mdash; Bet smarter. 18+ &nbsp;|&nbsp; Please gamble responsibly.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/acca.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
